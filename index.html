<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sold A Dream</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<div id="big-win-banner" class="big-win-banner hidden">
    BIG WIN!
</div>
<body>
    <div class="start-overlay" id="start-overlay">
        <div class="start-content">
            <h2><img src="images/logo1.png" class="logo1" alt="Logo" style="top: 20%;" ></h2>
            <button id="start-btn" class="start-button">START</button>
        </div>
    </div>
<div class="top-banner">
    <div class="side-images left">
        <img src="images/cards.PNG">
        <img src="images/bar.PNG">
    </div>
    <img src="images/logo1.png" class="top-logo">
    <div class="side-images right">
        <img src="images/cherry.PNG">
        <img src="images/dice.PNG">
    </div>
</div>

   <div class="machine">
        <div class="header">
            <div class="credits">
                <span>CREDITS: </span><span id="credits">100</span>
            </div>
        </div>
        
        <div class="slot-container">
            <!-- <div class="win-line"></div> -->
            <div class="reel-window">
                <div class="reel" id="reel1">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel2">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel3">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel4">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel5">
                    <!-- Videos injected by JS -->
                </div>
            </div>
        </div>
        
        <div class="result-display">
            <span id="result-text">SPIN TO WIN!</span>
        </div>
        
        <div class="controls">
            <button id="spin-btn" class="spin-button">
                <span class="spin-text">SPIN</span>
                <span class="spin-cost">-10 credits</span>
            </button>
        </div>
        
        <div class="payout-table">
            <h3>PAYOUTS</h3>
            <div class="payout-row">3 Matching = <strong>50 credits</strong></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>
</html>
