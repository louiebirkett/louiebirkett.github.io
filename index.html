<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Slots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="start-overlay" id="start-overlay">
        <div class="start-content">
            <h2>🎰 REEL SLOTS 🎰</h2>
            <button id="start-btn" class="start-button">CLICK TO START</button>
        </div>
    </div>

    <div class="machine">
        <div class="header">
            <h1>🎰 REEL SLOTS 🎰</h1>
            <div class="credits">
                <span>CREDITS: </span><span id="credits">100</span>
            </div>
        </div>
        
        <div class="slot-container">
            <div class="win-line"></div>
            <div class="reel-window">
                <div class="reel" id="reel1">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel2">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel3">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel4">
                    <!-- Videos injected by JS -->
                </div>
            </div>
            <div class="reel-window">
                <div class="reel" id="reel5">
                    <!-- Videos injected by JS -->
                </div>
            </div>
        </div>
        
        <div class="result-display">
            <span id="result-text">SPIN TO WIN!</span>
        </div>
        
        <div class="controls">
            <button id="spin-btn" class="spin-button">
                <span class="spin-text">SPIN</span>
                <span class="spin-cost">-10 credits</span>
            </button>
        </div>
        
        <div class="payout-table">
            <h3>PAYOUTS</h3>
            <div class="payout-row">3 Matching = <strong>50 credits</strong></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
